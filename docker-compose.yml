version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: opc-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - opc-mongo-data:/data/db

  redis:
    image: redis:7
    container_name: opc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - opc-redis-data:/data

volumes:
  opc-mongo-data:
  opc-redis-data:
